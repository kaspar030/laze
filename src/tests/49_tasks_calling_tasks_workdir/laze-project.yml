builders:
  - name: default
    rules:
      - name: LINK
        in: "o"
        cmd: "cat ${in} > ${out}"

    env:
      bindir: build/${builder}/${app}

    tasks:
      wd:
        cmd:
          - basename $$(realpath .)
      wd_subtask:
        workdir: build
        cmd:
          - :wd

apps:
  - name: app
