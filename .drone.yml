---
kind: pipeline
type: docker
name: default

steps:
- name: test
  image: rust:latest
  commands:
  - apt-get update
  - apt-get install -y ninja-build
  - cargo build --verbose --all
  - cargo test --verbose --all
  - cargo install --path .
  - make -C src/tests
